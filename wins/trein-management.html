<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="TREIN Management chooses Rev.io PSA 2.0">
<meta property="og:description" content="Saving time eliminating swivel chair">
<title>TREIN Management · Rev.io Win Story</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F4F8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:16px;width:100%;max-width:580px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.10);}
  .card-header{background:linear-gradient(135deg,#0A1628 0%,#1B3A6B 100%);padding:28px 32px 24px;display:flex;align-items:flex-start;justify-content:space-between;}
  .badge-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .win-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#64E8B0;}
  .comp-badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;background:linear-gradient(90deg,#C8962C,#F0C040);color:#1A1000;padding:3px 10px;border-radius:20px;}
  .company{font-size:26px;font-weight:800;color:#fff;line-height:1.15;letter-spacing:-0.5px;}
  .product-badge{background:rgba(27,110,243,.25);border:1px solid rgba(27,110,243,.5);color:#7BB8FF;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-top:8px;display:inline-block;text-transform:uppercase;letter-spacing:1px;}
  .logo-header{margin-left:16px;margin-top:2px;flex-shrink:0;}
  .logo-header img{height:28px;width:auto;filter:brightness(0) invert(1);opacity:.9;}
  .card-body{padding:24px 32px;}
  .row{margin-bottom:20px;}
  .row-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#8A9BB2;margin-bottom:8px;}
  .competitor-tag{display:inline-block;background:#FFF3F3;border:1px solid #FFD0D0;color:#C0392B;font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px;margin-right:6px;margin-bottom:4px;}
  .competitor-tag.psa{background:#FFF8E8;border-color:#E8C060;color:#7A5000;}
  .feature-list{list-style:none;}
  .feature-list li{font-size:14px;color:#1a2a3a;padding:6px 0;border-bottom:1px solid #F0F4F8;display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
  .feature-list li:last-child{border-bottom:none;}
  .feature-list li::before{content:'✓';color:#1B6EF3;font-weight:700;font-size:13px;flex-shrink:0;margin-top:1px;}
  .value-list{list-style:none;}
  .value-list li{font-size:14px;color:#1a2a3a;padding:7px 0;border-bottom:1px solid #F0F4F8;display:flex;align-items:flex-start;gap:10px;line-height:1.45;}
  .value-list li:last-child{border-bottom:none;}
  .value-list li::before{content:'→';color:#6fbf50;font-weight:700;font-size:14px;flex-shrink:0;}
  .card-footer{background:#F7F9FF;border-top:1px solid #E8EDF5;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;}
  .logo-footer img{height:22px;width:auto;}
  .footer-date{font-size:12px;color:#8A9BB2;}
</style></head>
<body><div class="card">
  <div class="card-header">
    <div>
      <div class="badge-row">
        <span class="win-badge">⚡ Customer Win</span>
        
      </div>
      <div class="company">TREIN Management</div>
      <div class="product-badge">PSA 2.0</div>
    </div>
    <div class="logo-header"><img src="revio-logo.svg" alt="Rev.io"></div>
  </div>
  <div class="card-body">
    
    
    <div class="row"><div class="row-label">Client Value</div><ul class="value-list"><li>Saving time eliminating swivel chair</li><li>Cutting down on multiple platforms</li></ul></div>
  </div>
  <div class="card-footer">
    <div class="logo-footer"><img src="revio-logo.svg" alt="Rev.io"></div>
    <div class="footer-date">January 2026</div>
  </div>
</div></body></html>
