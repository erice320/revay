<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Alarm Security Inc chooses Rev.io PSA 2.0">
<meta property="og:description" content="">
<meta property="og:image" content="https://rev.io/wp-content/uploads/revio-social.png">
<title>Alarm Security Inc · Rev.io Win Story</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #F0F4F8;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    width: 100%;
    max-width: 560px;
    overflow: hidden;
  }
  .card-header {
    background: linear-gradient(135deg, #0A1628 0%, #1B3A6B 100%);
    padding: 28px 32px 24px;
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .card-header .badge {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: #64E8B0; margin-bottom: 8px;
  }
  .card-header .company {
    font-size: 26px; font-weight: 800; color: #fff; line-height: 1.15;
    letter-spacing: -0.5px;
  }
  .card-header .product-badge {
    background: rgba(27,110,243,0.25);
    border: 1px solid rgba(27,110,243,0.5);
    color: #7BB8FF;
    font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap; margin-top: 4px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .revio-logo {
    font-size: 18px; font-weight: 900; color: #fff;
    letter-spacing: -0.5px; opacity: 0.9; white-space: nowrap;
    margin-left: 16px; margin-top: 4px;
  }
  .revio-logo span { color: #1B6EF3; }

  .card-body { padding: 24px 32px; }

  .row { margin-bottom: 20px; }
  .row-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: #8A9BB2; margin-bottom: 6px;
  }
  .competitor-tag {
    display: inline-block; background: #FFF3F3; border: 1px solid #FFD0D0;
    color: #C0392B; font-size: 13px; font-weight: 600;
    padding: 4px 12px; border-radius: 20px; margin-right: 6px; margin-bottom: 4px;
  }
  .feature-list { list-style: none; }
  .feature-list li {
    font-size: 14px; color: #1a2a3a; padding: 5px 0;
    border-bottom: 1px solid #F0F4F8;
    display: flex; align-items: center; gap: 8px;
  }
  .feature-list li:last-child { border-bottom: none; }
  .feature-list li::before {
    content: '✓'; color: #1B6EF3; font-weight: 700; font-size: 13px;
  }
  .quote-box {
    background: #F7F9FF; border-left: 3px solid #1B6EF3;
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
  }
  .quote-box .qtext {
    font-size: 14px; color: #1a2a3a; line-height: 1.6;
    font-style: italic;
  }

  .card-footer {
    background: #F7F9FF; border-top: 1px solid #E8EDF5;
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-brand { font-size: 14px; font-weight: 800; color: #0A1628; letter-spacing: -0.3px; }
  .footer-date { font-size: 12px; color: #8A9BB2; }

  @media(max-width: 400px) {
    .card-header .company { font-size: 20px; }
    .card-body { padding: 20px; }
    .card-footer { padding: 14px 20px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div>
      <div class="badge">⚡ New Win</div>
      <div class="company">Alarm Security Inc</div>
      <div class="product-badge">PSA 2.0</div>
    </div>
    <div class="revio-logo">rev<span>.</span>io</div>
  </div>

  <div class="card-body">
    
    <div class="row">
      <div class="row-label">Switching From</div>
      <span class="competitor-tag">QuickBooks</span>
    </div>

    
    <div class="row">
      <div class="row-label">What They Wanted</div>
      <ul class="feature-list">
        <li>QuickBooks Online</li><li>User Management/Authentication</li><li>Dispatch Board</li><li>Serialized Inventory Management</li>
      </ul>
    </div>

    
  </div>

  <div class="card-footer">
    <div class="footer-brand">rev<span style="color:#1B6EF3">.</span>io PSA</div>
    <div class="footer-date">January 2026</div>
  </div>
</div>
</body>
</html>
